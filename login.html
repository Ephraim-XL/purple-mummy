<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | Purple Mummy ELIXIRS</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
    <style>
        body {
            background-color: var(--color-bg);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .login-card {
            background: var(--color-white);
            padding: 3rem;
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-lg);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        .brand-logo {
            justify-content: center;
            margin-bottom: 2rem;
            font-size: 2rem;
        }
        .form-group {
            text-align: left;
            margin-bottom: 1.5rem;
        }
        .error-msg {
            color: var(--color-error);
            font-size: 0.85rem;
            margin-bottom: 1rem;
            display: none;
        }
        .error-msg.show {
            display: block;
        }
    </style>
</head>
<body>

    <div class="login-card">
        <a href="index.html" class="brand-logo brand-font">
            PM <span>ELIXIRS</span>
        </a>
        <h2 style="margin-bottom: 0.5rem; font-weight: 600;">Admin Portal</h2>
        <p class="text-light" style="margin-bottom: 2rem; font-size: 0.9rem;">Sign in to manage your store.</p>
        
        <div id="login-error" class="error-msg">Invalid username or password.</div>
        
        <form id="login-form">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" class="form-control" required placeholder="Enter username">
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" class="form-control" required placeholder="Enter password">
            </div>
            
            <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">
                Sign In
            </button>
        </form>
        
        <div style="margin-top: 2rem; font-size: 0.8rem; color: var(--color-text-light);">
            <p>Hint: Use <strong>admin</strong> / <strong>admin123</strong></p>
            <p style="margin-top: 0.5rem;"><a href="index.html" style="text-decoration: underline;">Return to Storefront</a></p>
        </div>
    </div>

    <script>
        document.getElementById('login-form').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            const errorEl = document.getElementById('login-error');
            
            if (user === 'admin' && pass === 'admin123') {
                sessionStorage.setItem('pm_admin_auth', 'true');
                window.location.href = 'admin.html';
            } else {
                errorEl.classList.add('show');
            }
        });
        
        // If already logged in, redirect
        if (sessionStorage.getItem('pm_admin_auth') === 'true') {
            window.location.replace('admin.html');
        }
    </script>
</body>
</html>
