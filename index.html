<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Purple Mummy ELIXIRS | Luxury Fragrances</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

    <header class="site-header">
        <div class="container flex items-center justify-between">
            <a href="index.html" class="brand-logo brand-font">
                Purple Mummy
                <span>ELIXIRS</span>
            </a>
            
            <nav class="nav-links">
                <a href="#shop">Shop</a>
                <a href="#collections">Collections</a>
                <a href="#our-story">Our Story</a>
            </nav>

            <div class="cart-icon">
                <a href="cart.html" class="btn btn-secondary" style="display:inline-block; width:100%; text-align:center;">
                    Cart (<span id="cart-count">0</span>)
                </a>
            </div>
        </div>
    </header>

    <main>
        <!-- Hero Section will be inserted here by JS -->
        <div id="hero-section"></div>

        <!-- Product Grid -->
        <section id="shop" class="shop-section">
            <div class="container">
                <h2 class="section-title brand-font">Our Collection</h2>
                <div id="product-grid" class="grid product-grid">
                    <!-- Products rendered via JS -->
                </div>
            </div>
        </section>
    </main>

    <footer class="site-footer">
        <div class="container flex justify-between">
            <div class="footer-brand">
                <h3 class="brand-font">Purple Mummy ELIXIRS</h3>
                <p>Luxurious artisanal oil perfumes crafted for elegance.</p>
            </div>
            <div class="footer-links">
                <h4>Customer Care</h4>
                <ul>
                    <li><a href="#">Contact Us</a></li>
                    <li><a href="#">Shipping & Returns</a></li>
                    <li><a href="#">FAQ</a></li>
                </ul>
            </div>
        </div>
    </footer>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="js/firebase-config.js"></script>
    <script src="js/db.js"></script>
    <script src="js/storefront.js"></script>
</body>
</html>
